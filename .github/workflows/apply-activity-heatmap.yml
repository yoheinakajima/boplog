name: Apply activity heatmap branch update

on:
  push:
    branches:
      - agent/activity-heatmap
    paths:
      - '.activity-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/activity-heatmap
          fetch-depth: 0

      - name: Patch site
        shell: python
        run: |
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text()
          text = text.replace('2026-07-22.6', '2026-07-22.7')
          anchor = '''      <div class="section-line">
        <h2 id="archive-title"><span aria-hidden="true">//</span> build log</h2>
        <p id="result-count" aria-live="polite">121 / 121</p>
      </div>

      <details class="filter-disclosure" id="filter-disclosure">'''
          replacement = '''      <div class="section-line">
        <h2 id="archive-title"><span aria-hidden="true">//</span> build log</h2>
        <p id="result-count" aria-live="polite">121 / 121</p>
      </div>

      <section class="activity" aria-labelledby="activity-title">
        <div class="activity__header">
          <h3 id="activity-title">build activity</h3>
          <span id="activity-selection" aria-live="polite">last 52 weeks</span>
        </div>
        <div class="activity__scroll" tabindex="0" aria-label="Build activity calendar. Select a day to filter the archive.">
          <div class="activity__map" id="activity-map"></div>
        </div>
        <div class="activity__legend" aria-hidden="true">
          <span>less</span><i data-level="0"></i><i data-level="1"></i><i data-level="2"></i><i data-level="3"></i><i data-level="4"></i><span>more</span>
        </div>
      </section>

      <details class="filter-disclosure" id="filter-disclosure">'''
          if anchor not in text:
              raise SystemExit('index anchor not found')
          index.write_text(text.replace(anchor, replacement, 1))

          app = Path('app.js')
          text = app.read_text()
          text = text.replace("const BUILD_VERSION = '20260722.6';", "const BUILD_VERSION = '20260722.7';", 1)
          text = text.replace("    year: '',\n    sort: 'newest',", "    year: '',\n    date: '',\n    sort: 'newest',", 1)
          text = text.replace("    filterSummary: document.querySelector('#filter-summary'),\n", "    filterSummary: document.querySelector('#filter-summary'),\n    activityMap: document.querySelector('#activity-map'),\n    activitySelection: document.querySelector('#activity-selection'),\n", 1)
          text = text.replace("      if (state.year && !project.date.startsWith(state.year)) return false;\n", "      if (state.year && !project.date.startsWith(state.year)) return false;\n      if (state.date && project.date !== state.date) return false;\n", 1)
          heatmap = '''  function isoDate(date) {
    return date.toISOString().slice(0, 10);
  }

  function localDateLabel(value) {
    const date = new Date(`${value}T12:00:00Z`);
    return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' }).format(date);
  }

  function activityLevel(count, maxCount) {
    if (!count) return 0;
    if (maxCount <= 1) return 2;
    return Math.min(4, Math.max(1, Math.ceil((count / maxCount) * 4)));
  }

  function renderActivityMap() {
    if (!elements.activityMap) return;
    const counts = new Map();
    for (const project of state.projects) counts.set(project.date, (counts.get(project.date) || 0) + 1);

    const latestProject = [...state.projects].sort((a, b) => b.date.localeCompare(a.date))[0];
    const today = new Date();
    today.setUTCHours(12, 0, 0, 0);
    const latestDate = latestProject ? new Date(`${latestProject.date}T12:00:00Z`) : today;
    const end = latestDate > today ? latestDate : today;
    end.setUTCDate(end.getUTCDate() + (6 - end.getUTCDay()));
    const start = new Date(end);
    start.setUTCDate(start.getUTCDate() - (52 * 7 - 1));
    const maxCount = Math.max(1, ...counts.values());
    const weeks = [];
    const monthLabels = [];
    let previousMonth = -1;

    for (let week = 0; week < 52; week += 1) {
      const days = [];
      const weekStart = new Date(start);
      weekStart.setUTCDate(start.getUTCDate() + week * 7);
      const month = weekStart.getUTCMonth();
      if (month !== previousMonth) {
        monthLabels.push(`<span style="grid-column:${week + 1}">${weekStart.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' })}</span>`);
        previousMonth = month;
      }
      for (let day = 0; day < 7; day += 1) {
        const date = new Date(weekStart);
        date.setUTCDate(weekStart.getUTCDate() + day);
        const value = isoDate(date);
        const count = counts.get(value) || 0;
        const selected = value === state.date;
        const label = `${count} ${count === 1 ? 'build' : 'builds'} on ${localDateLabel(value)}`;
        days.push(`<button class="activity__cell${selected ? ' is-selected' : ''}" type="button" data-activity-date="${value}" data-level="${activityLevel(count, maxCount)}" aria-pressed="${selected}" aria-label="${label}" title="${label}"></button>`);
      }
      weeks.push(`<div class="activity__week">${days.join('')}</div>`);
    }

    elements.activityMap.innerHTML = `<div class="activity__months">${monthLabels.join('')}</div><div class="activity__days" aria-hidden="true"><span>Mon</span><span>Wed</span><span>Fri</span></div><div class="activity__weeks">${weeks.join('')}</div>`;
    elements.activitySelection.textContent = state.date ? `${localDateLabel(state.date)} · click again to clear` : 'last 52 weeks';
  }

'''
          marker = '  function renderArchive() {\n'
          if marker not in text:
              raise SystemExit('render marker missing')
          text = text.replace(marker, heatmap + marker, 1)
          text = text.replace("      Boolean(state.year),\n      state.sort !== 'newest',", "      Boolean(state.year),\n      Boolean(state.date),\n      state.sort !== 'newest',", 1)
          text = text.replace("    state.year = params.get('year') || '';\n    state.sort", "    state.year = params.get('year') || '';\n    state.date = params.get('date') || '';\n    state.sort", 1)
          text = text.replace("    if (state.year) params.set('year', state.year);\n", "    if (state.year) params.set('year', state.year);\n    if (state.date) params.set('date', state.date);\n", 1)
          text = text.replace("    renderArchive();\n    renderFilterSummary();", "    renderArchive();\n    renderActivityMap();\n    renderFilterSummary();", 1)
          text = text.replace("    state.year = '';\n    state.sort", "    state.year = '';\n    state.date = '';\n    state.sort", 1)
          event_anchor = "    elements.archive.addEventListener('click', (event) => {\n"
          event_code = """    elements.activityMap?.addEventListener('click', (event) => {
      const cell = event.target.closest('[data-activity-date]');
      if (!cell) return;
      const date = cell.dataset.activityDate || '';
      state.date = state.date === date ? '' : date;
      render();
      document.querySelector('#archive-title').scrollIntoView({ block: 'start', behavior: 'smooth' });
    });

"""
          if event_anchor not in text:
              raise SystemExit('event anchor missing')
          text = text.replace(event_anchor, event_code + event_anchor, 1)
          app.write_text(text)

          css = Path('styles.css')
          text = css.read_text()
          anchor = '.filter-disclosure {'
          styles = '''.activity { padding: 8px 0 14px; }
.activity__header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 8px; font-family: var(--mono); }
.activity__header h3 { margin: 0; color: var(--muted); font-size: 10px; font-weight: 600; text-transform: lowercase; }
.activity__header span { color: var(--faint); font-size: 10px; }
.activity__scroll { overflow-x: auto; padding: 2px 0 5px; scrollbar-width: thin; }
.activity__map { position: relative; width: max-content; min-width: 100%; padding: 18px 0 0 31px; }
.activity__months { position: absolute; top: 0; left: 31px; display: grid; grid-template-columns: repeat(52, 11px); gap: 3px; height: 14px; color: var(--faint); font: 9px/1 var(--mono); }
.activity__months span { white-space: nowrap; }
.activity__days { position: absolute; top: 18px; left: 0; display: grid; grid-template-rows: repeat(7, 11px); gap: 3px; color: var(--faint); font: 8px/11px var(--mono); }
.activity__days span:nth-child(1) { grid-row: 2; }
.activity__days span:nth-child(2) { grid-row: 4; }
.activity__days span:nth-child(3) { grid-row: 6; }
.activity__weeks { display: flex; gap: 3px; }
.activity__week { display: grid; grid-template-rows: repeat(7, 11px); gap: 3px; }
.activity__cell { width: 11px; height: 11px; padding: 0; border: 1px solid rgba(27, 31, 36, 0.06); border-radius: 2px; background: #ebedf0; cursor: pointer; }
.activity__cell[data-level="1"] { background: #9be9a8; }
.activity__cell[data-level="2"] { background: #40c463; }
.activity__cell[data-level="3"] { background: #30a14e; }
.activity__cell[data-level="4"] { background: #216e39; }
.activity__cell:hover { border-color: var(--text); }
.activity__cell.is-selected, .activity__cell:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.activity__legend { display: flex; align-items: center; justify-content: flex-end; gap: 3px; margin-top: 4px; color: var(--faint); font: 9px/1 var(--mono); }
.activity__legend i { width: 10px; height: 10px; border: 1px solid rgba(27, 31, 36, 0.06); border-radius: 2px; background: #ebedf0; }
.activity__legend i[data-level="1"] { background: #9be9a8; }
.activity__legend i[data-level="2"] { background: #40c463; }
.activity__legend i[data-level="3"] { background: #30a14e; }
.activity__legend i[data-level="4"] { background: #216e39; }

'''
          if anchor not in text:
              raise SystemExit('css anchor missing')
          css.write_text(text.replace(anchor, styles + anchor, 1))

      - name: Validate
        run: npm run check

      - name: Commit branch update
        shell: bash
        run: |
          rm -f .activity-trigger .github/workflows/add-activity-map.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add interactive build activity heatmap'
          git push origin HEAD:agent/activity-heatmap
