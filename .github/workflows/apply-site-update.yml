name: Apply generated site update

on:
  push:
    branches:
      - agent/talk-banner-ai-discovery
    paths:
      - '.site-update/**'
      - '.github/workflows/apply-site-update.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message != 'Apply generated site update'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify payload
        shell: bash
        run: |
          cat .site-update/payload.* | base64 --decode > /tmp/site-update.tar.gz
          echo '45e8612d389c4272052de8a4232366249915ff14cb1fc101efaef457f698d9d3  /tmp/site-update.tar.gz' | sha256sum --check --strict

      - name: Apply generated files
        shell: bash
        run: |
          tar -xzf /tmp/site-update.tar.gz -C .
          rm -rf .site-update
          rm -f .github/workflows/apply-site-update.yml

      - name: Validate site
        run: npm run check

      - name: Commit generated update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Apply generated site update'
          git push origin HEAD:${GITHUB_REF_NAME}
