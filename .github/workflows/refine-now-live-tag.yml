name: Refine now-live talk banner

on:
  push:
    branches:
      - agent/talk-banner-ai-discovery
    paths:
      - '.github/workflows/refine-now-live-tag.yml'

permissions:
  contents: write

jobs:
  refine:
    if: github.event.head_commit.message == 'Stage now-live talk banner refinement'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/talk-banner-ai-discovery
          fetch-depth: 0

      - name: Update banner wording and behavior
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              "index.html": [
                  ('<meta name="boplog-build" content="2026-07-22.4">', '<meta name="boplog-build" content="2026-07-22.5">'),
                  ('./styles.css?v=20260722.4', './styles.css?v=20260722.5'),
                  ('./app.js?v=20260722.4', './app.js?v=20260722.5'),
                  ('"name": "ActiveGraph — live from AI Engineer World\'s Fair | Yohei Nakajima"', '"name": "ActiveGraph at AI Engineer World\'s Fair | Yohei Nakajima"'),
                  ('"description": "Yohei Nakajima presents ActiveGraph live from AI Engineer World\'s Fair, streaming July 22, 2026 at 10:00 AM Pacific Time."', '"description": "Yohei Nakajima\'s ActiveGraph talk from AI Engineer World\'s Fair, published online July 22, 2026 at 10:00 AM Pacific Time."'),
                  ('<span id="talk-kicker" aria-live="polite">premieres soon</span>', '<span id="talk-kicker" aria-live="polite">now live</span>'),
                  ('<h2 id="talk-title">ActiveGraph — live from AI Engineer World\'s Fair</h2>', '<h2 id="talk-title">ActiveGraph at AI Engineer World\'s Fair</h2>'),
                  ('<span id="talk-countdown">calculating countdown…</span>', '<span id="talk-countdown">available on YouTube</span>'),
                  ('>set reminder ↗</a>', '>watch talk ↗</a>'),
              ],
              "app.js": [
                  ("const BUILD_VERSION = '20260722.4';", "const BUILD_VERSION = '20260722.5';"),
                  ("elements.talkKicker.textContent = 'premieres in';", "elements.talkKicker.textContent = 'now live';"),
                  ("elements.talkLink.textContent = 'set reminder ↗';", "elements.talkLink.textContent = 'watch talk ↗';"),
              ],
              "llms.txt": [
                  ('- [ActiveGraph — live from AI Engineer World\'s Fair](https://www.youtube.com/watch?v=khVX_BUnEwU): Streams July 22, 2026 at 10:00 AM Pacific Time; the same URL becomes the recording afterward.', '- [ActiveGraph at AI Engineer World\'s Fair](https://www.youtube.com/watch?v=khVX_BUnEwU): Now available on YouTube; published July 22, 2026 at 10:00 AM Pacific Time.'),
              ],
          }

          for filename, pairs in replacements.items():
              path = Path(filename)
              text = path.read_text()
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f"Expected text not found in {filename}: {old}")
                  text = text.replace(old, new, 1)
              path.write_text(text)

      - name: Validate
        run: npm run check

      - name: Commit update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html app.js llms.txt
          git commit -m 'Use now-live tag for ActiveGraph talk'
          git push origin HEAD:agent/talk-banner-ai-discovery