name: Finalize published talk banner

on:
  push:
    branches:
      - agent/permanent-now-live-banner
    paths:
      - '.github/workflows/finalize-live-banner.yml'

permissions:
  contents: write

jobs:
  update:
    if: github.event.head_commit.message == 'Stage permanent live banner update'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/permanent-now-live-banner
          fetch-depth: 0

      - name: Make banner permanently live
        shell: python
        run: |
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text()
          replacements = [
              ('<meta name="boplog-build" content="2026-07-22.5">', '<meta name="boplog-build" content="2026-07-22.6">'),
              ('./styles.css?v=20260722.5', './styles.css?v=20260722.6'),
              ('./app.js?v=20260722.5', './app.js?v=20260722.6'),
              ('        "@type": "Event",\n        "@id": "https://yohei.me/#ai-engineer-talk-2026-07-22",\n        "name": "ActiveGraph at AI Engineer World\'s Fair | Yohei Nakajima",\n        "description": "Yohei Nakajima\'s ActiveGraph talk from AI Engineer World\'s Fair, published online July 22, 2026 at 10:00 AM Pacific Time.",\n        "startDate": "2026-07-22T10:00:00-07:00",\n        "eventStatus": "https://schema.org/EventScheduled",\n        "eventAttendanceMode": "https://schema.org/OnlineEventAttendanceMode",\n        "location": {\n          "@type": "VirtualLocation",\n          "url": "https://www.youtube.com/watch?v=khVX_BUnEwU"\n        },\n        "performer": { "@id": "https://yohei.me/#yohei" },\n        "organizer": { "@id": "https://yohei.me/#yohei" },\n        "url": "https://www.youtube.com/watch?v=khVX_BUnEwU"', '        "@type": "VideoObject",\n        "@id": "https://yohei.me/#activegraph-ai-engineer-talk",\n        "name": "ActiveGraph at AI Engineer World\'s Fair | Yohei Nakajima",\n        "description": "Yohei Nakajima\'s ActiveGraph talk from AI Engineer World\'s Fair, now available on YouTube.",\n        "uploadDate": "2026-07-22",\n        "contentUrl": "https://www.youtube.com/watch?v=khVX_BUnEwU",\n        "embedUrl": "https://www.youtube.com/embed/khVX_BUnEwU",\n        "creator": { "@id": "https://yohei.me/#yohei" }'),
              ('    <aside class="talk-banner" id="talk-banner" data-start="2026-07-22T10:00:00-07:00" aria-labelledby="talk-title">', '    <aside class="talk-banner is-live" id="talk-banner" aria-labelledby="talk-title">'),
              ('        <div class="talk-banner__time">\n          <time datetime="2026-07-22T10:00:00-07:00">July 22, 2026 · 10:00 AM PT</time>\n          <span id="talk-countdown">available on YouTube</span>\n        </div>\n', ''),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected index text not found: {old[:90]}')
              text = text.replace(old, new, 1)
          index.write_text(text)

          app = Path('app.js')
          text = app.read_text()
          text = text.replace("const BUILD_VERSION = '20260722.5';", "const BUILD_VERSION = '20260722.6';", 1)
          for line in [
              "    talkBanner: document.querySelector('#talk-banner'),\n",
              "    talkKicker: document.querySelector('#talk-kicker'),\n",
              "    talkCountdown: document.querySelector('#talk-countdown'),\n",
              "    talkLink: document.querySelector('#talk-link'),\n",
          ]:
              text = text.replace(line, '', 1)
          start = text.index('  function formatCountdown(milliseconds) {')
          end = text.index('  function versionedDataUrl(', start)
          text = text[:start] + text[end:]
          text = text.replace('  initTalkBanner();\n', '', 1)
          app.write_text(text)

          llms = Path('llms.txt')
          text = llms.read_text()
          old = "- [ActiveGraph at AI Engineer World's Fair](https://www.youtube.com/watch?v=khVX_BUnEwU): Now available on YouTube; published July 22, 2026 at 10:00 AM Pacific Time."
          new = "- [ActiveGraph at AI Engineer World's Fair](https://www.youtube.com/watch?v=khVX_BUnEwU): Now live on YouTube."
          if old not in text:
              raise SystemExit('Expected llms.txt talk entry not found')
          llms.write_text(text.replace(old, new, 1))

      - name: Validate
        run: npm run check

      - name: Commit update
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html app.js llms.txt
          git commit -m 'Make ActiveGraph talk banner permanently live'
          git push origin HEAD:agent/permanent-now-live-banner
