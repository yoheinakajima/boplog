name: Validate site

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - name: Validate agent interfaces
        run: |
          python3 -m py_compile yohei mcp/yohei_mcp.py
          python3 -m json.tool openapi.json >/dev/null
          python3 -m json.tool .well-known/agent-skills >/dev/null
          python3 -m json.tool .well-known/mcp >/dev/null
          sh -n skills.sh
